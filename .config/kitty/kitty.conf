# See https://sw.kovidgoyal.net/kitty/conf

macos_option_as_alt yes
macos_titlebar_color background
macos_show_window_title_in window
macos_colorspace srgb

scrollback_lines 10000

# Mouse stuff
copy_on_select yes

# Terminal Bell
enable_audio_bell no
visual_bell_duration 0.25
visual_bell_color #444444


#########################################################
# Cursors                                               #
#########################################################

cursor_text_color #504945 # GruvBox BG2
cursor #EBDBB2 # GruvBox FG

cursor_trail 50
cursor_trail_decay 0.1 0.8
cursor_trail_start_threshold 5
cursor_trail_color #FE8019 # GruvBox Light Orange

#########################################################


background_opacity 0.9
background_blur 30
dynamic_background_opacity yes

# [colors.primary]
background #282828 # GruvBox BG
foreground #EBDBB2 # GruvBox FG

# [colors.selection]
selection_foreground #7C3836
selection_background #EBDBB2

# [colors.normal]
color0 #504945 # Black - GruvBox BG2
color1 #CC241D # Red - GruvBox Red
color2 #98971A # Green - GruvBox Green
color3 #D79921 # Yellow - GruvBox Yellow
color4 #458588 # Blue - GruvBox Blue
color5 #B16286 # Magenta - GruvBox Purple
color6 #689D6A # Cyan - GruvBox Aqua
color7 #A89984 # White - GruvBox Gray

# [colors.bright]
color8  #928374 # Light Black - GruvBox Dark Gray
color9  #729374 # Light Red - GruvBox Light Red
color10 #B8BB26 # Light Green - GruvBox Light Green
color11 #FABD2F # Light Yellow - GruvBox Light Yellow
color12 #83A598 # Light Blue - GruvBox Light Blue
color13 #D3869B # Light Magenta - GruvBox Light Purple
color14 #8EC07C # Light Cyan - GruvBox Light Aqua
color15 #FBF1C7 # Light White - GruvBox FG0

#########################################################
# Key Bindings                                          #
#########################################################

# Move between tabs (same approach for other apps)
map shift+cmd+l next_tab
map shift+cmd+h previous_tab

# Create new Kitty tab (same as other apps)
map cmd+t new_tab_with_cwd

# Open Kitty Command Palette
map kitty_mod+space command_palette

# Navigation between vim and kitty windows
map ctrl+h neighboring_window left
map ctrl+j neighboring_window down
map ctrl+k neighboring_window up
map ctrl+l neighboring_window right
map --when-focus-on var:IS_VIM=true ctrl+h
map --when-focus-on var:IS_VIM=true ctrl+j
map --when-focus-on var:IS_VIM=true ctrl+k
map --when-focus-on var:IS_VIM=true ctrl+l

# Session management

map kitty_mod+tab goto_session ~/.local/share/kitty/sessions

#########################################################


#########################################################
# Remote Control                                         #
#########################################################

listen_on unix:/tmp/kitty
allow_remote_control yes

#########################################################


#########################################################
# Notifications                                         #
#########################################################

# Send a notification when a command takes more than 5 seconds in an unfocused window
notify_on_cmd_finish unfocused

#########################################################


#########################################################
# BEGIN_KITTY_FONTS                                     #
#########################################################

font_size 15.0
font_family family="RobotoMono Nerd Font"
bold_font auto
italic_font auto
bold_italic_font auto

#########################################################


#########################################################
# Windows                                               #
#########################################################

remember_window_size no
initial_window_width 1600
initial_window_height 900
resize_in_steps yes
window_resize_step_cells 1
window_resize_step_lines 1

# The enabled window layouts. A comma separated list of layout names. The
# special value all means all layouts. The first listed layout will be used as
# the startup layout. Default configuration is all layouts in alphabetical
# order. For a list of available layouts, see the Layouts.

enabled_layouts tall, stack

# Control the position of the window title bar relative to the window content.
# Use window_title_bar_min_windows to control when title bars are shown. Use
# window_title_template to format the displayed window title.

# window_title_bar top


# The minimum number of visible windows in a tab before window title bars are
# shown. A value of 0 means never show. 1 means always show. 2 or more means
# show only when at least that many windows are visible. Similar to
# tab_bar_min_tabs for the tab bar.

window_title_bar_min_windows 2


# A template to render the window title bar text. Uses the same template syntax
# as tab_title_template. Available variables include: {title}, {bell_symbol},
# {activity_symbol}, {progress_percent}, {custom}, {fmt}, {is_active}. You can
# also provide a custom draw_window_title(data) function in window_title_bar.py
# in the kitty config directory, exposed as {custom}.

# window_title_template
# "{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.window}{progress_percent}{title}"


# Template to use for the active window title bar. If not set (the value none),
# the window_title_template is used.

# active_window_title_template none


# Foreground color for the active window title bar. Defaults to the
# corresponding tab bar color (active_tab_foreground) when set to none.

window_title_bar_active_foreground #689D6A # GruvBox Aqua


# Background color for the active window title bar. Defaults to the
# corresponding tab bar color (active_tab_background) when set to none.

window_title_bar_active_background #3C3836


# Foreground color for inactive window title bars. Defaults to the
# corresponding tab bar color (inactive_tab_foreground) when set to none.

window_title_bar_inactive_foreground #A89984 # GruvBox Gray


# Background color for inactive window title bars. Defaults to the
# corresponding tab bar color (inactive_tab_background) when set to none.

window_title_bar_inactive_background #3C3836


# Horizontal alignment of the text in window title bars.

window_title_bar_align left


# The width of window borders. Can be either in pixels (px) or pts (pt). Values
# in pts will be rounded to the nearest number of pixels based on screen
# resolution. If not specified, the unit is assumed to be pts. Note that
# borders are displayed only when more than one window is visible. They are
# meant to separate multiple windows.

window_border_width 0.75pt


# Draw only the minimum borders needed. This means that only the borders that
# separate the window from a neighbor are drawn. Note that setting a non-zero
# window_margin_width overrides this and causes all borders to be drawn.

# draw_minimal_borders yes


# Draw borders around a window even when there is only a single window visible.
# When enabled and there is only a single window, full borders are drawn around
# it (as if draw_minimal_borders is false). The border will show in the active
# color when the window is focused and the OS window has focus, and in the
# inactive color when the OS window loses focus. This provides a clear visual
# indicator of whether the kitty window is focused. When there are multiple
# windows visible, this option has no effect and normal border drawing rules
# apply.

# draw_window_borders_for_single_window no


# The window margin (in pts) (blank area outside the border). A single value
# sets all four sides. Two values set the vertical and horizontal sides. Three
# values set top, horizontal and bottom. Four values set top, right, bottom and
# left.

# window_margin_width 0


# The window margin to use when only a single window is visible (in pts).
# Negative values will cause the value of window_margin_width to be used
# instead. A single value sets all four sides. Two values set the vertical and
# horizontal sides. Three values set top, horizontal and bottom. Four values
# set top, right, bottom and left.

# single_window_margin_width -1


# The window padding (in pts) (blank area between the text and the window
# border). A single value sets all four sides. Two values set the vertical and
# horizontal sides. Three values set top, horizontal and bottom. Four values
# set top, right, bottom and left.

# window_padding_width 0


# The window padding to use when only a single window is visible (in pts).
# Negative values will cause the value of window_padding_width to be used
# instead. A single value sets all four sides. Two values set the vertical and
# horizontal sides. Three values set top, horizontal and bottom. Four values
# set top, right, bottom and left.

# single_window_padding_width -1


# When the window size is not an exact multiple of the cell size, the cell area
# of the terminal window will have some extra padding on the sides. You can
# control how that padding is distributed with this option. Using a value of
# center means the cell area will be placed centrally. A value of top-left
# means the padding will be only at the bottom and right edges. The value can
# be one of: top-left, top, top-right, left, center, right, bottom-left,
# bottom, bottom-right.

# placement_strategy center


# The color for the border of the active window. Set this to none to not draw
# borders around the active window.

active_border_color #689D6A # GruvBox Aqua


# The color for the border of inactive windows.

inactive_border_color #3C3836


# The color for the border of inactive windows in which a bell has occurred.

# bell_border_color #FF5A00


# Fade the text in inactive windows by the specified amount (a number between
# zero and one, with zero being fully faded).

inactive_text_alpha 0.8


# Hide the window decorations (title-bar and window borders) with yes. On
# macOS, titlebar-only and titlebar-and-corners can be used to only hide the
# titlebar and the rounded corners.
#
# On Wayland, titlebar-only can be used to hide the titlebar while keeping the
# window shadow for resizing. On compositors that have server-side decorations
# (such as anything but GNOME), both yes and titlebar-only force client-side
# decoration mode.
#
# Whether this works and exactly what effect it has depends on the window
# manager/operating system. Note that the effects of changing this option when
# reloading config are undefined. When using titlebar-only on macOS, it is
# useful to also set window_margin_width and placement_strategy to prevent the
# rounded corners from clipping text. Or use titlebar-and-corners.

# hide_window_decorations no

#########################################################


#########################################################
# Tabs                                                  #
#########################################################

# The edge to show the tab bar on, top or bottom.

tab_bar_edge top


# The margin to the left and right of the tab bar (in pts).
#
# tab_bar_margin_width 0.0


# The margin above and below the tab bar (in pts). The first number is the margin between the edge of the OS Window and the tab bar. The second number is the margin between the tab bar and the contents of the current tab.
#
# tab_bar_margin_height 0.0 0.0


# The tab bar style, can be one of:
#
# - fade - Each tab’s edges fade into the background color. (See also tab_fade)
# - slant - Tabs look like the tabs in a physical file.
# - separator - Tabs are separated by a configurable separator. (See also tab_separator)
# - powerline - Tabs are shown as a continuous line with “fancy” separators. (See also tab_powerline_style)
# - custom - A user-supplied Python function called draw_tab is loaded from the file tab_bar.py in the kitty config directory. For examples of how to write such a function, see the functions named draw_tab_with_* in kitty’s source code: kitty/tab_bar.py. See also this discussion for examples from kitty users.
# - hidden - The tab bar is hidden. If you use this, you might want to create a mapping for the select_tab action which presents you with a list of tabs and allows for easy switching to a tab.

tab_bar_style powerline


# A search expression. Only tabs that match this expression will be shown in
# the tab bar. The currently active tab is always shown, regardless of whether
# it matches or not. When using this option, the tab bar may be displayed with
# less tabs than specified in tab_bar_min_tabs, as evaluating the filter is
# expensive and is done only at display time. This is most useful when using
# sessions. An expression of session:~ or session:^$ will show only tabs that
# belong to the current session or no session. The various tab navigation
# actions such as goto_tab, next_tab, previous_tab, etc. are automatically
# restricted to work only on matching tabs.

# tab_bar_filter


# The horizontal alignment of the tab bar, can be one of: left, center, right.

# tab_bar_align left


# The minimum number of tabs that must exist before the tab bar is shown.

# tab_bar_min_tabs 2


# The algorithm to use when switching to a tab when the current tab is closed.
# The default of previous will switch to the last used tab. A value of left
# will switch to the tab to the left of the closed tab. A value of right will
# switch to the tab to the right of the closed tab. A value of last will switch
# to the right-most tab.

# tab_switch_strategy previous


# Control how each tab fades into the background when using fade for the
# tab_bar_style. Each number is an alpha (between zero and one) that controls
# how much the corresponding cell fades into the background, with zero being no
# fade and one being full fade. You can change the number of cells used by
# adding/removing entries to this list.

# tab_fade 0.25 0.5 0.75 1


# The separator between tabs in the tab bar when using separator as the
# tab_bar_style.

# tab_separator " ┇"


# The powerline separator style between tabs in the tab bar when using
# powerline as the tab_bar_style, can be one of: angled, slanted, round.

# tab_powerline_style angled


# Some text or a Unicode symbol to show on the tab if a window in the tab that
# does not have focus has some activity. If you want to use leading or trailing
# spaces, surround the text with quotes. See tab_title_template for how this is
# rendered.

# tab_activity_symbol none


# The maximum number of cells that can be used to render the text in a tab. A
# value of zero means that no limit is applied.

# tab_title_max_length 0


# A template to render the tab title. The default just renders the title with optional symbols for bell and activity. If you wish to include the tab-index as well, use something like: {index}:{title}. Useful if you have shortcuts mapped for goto_tab N. If you prefer to see the index as a superscript, use {sup.index}. All data available is:
#
# - title - The current tab title.
#
# - index - The tab index usable with goto_tab N shortcuts.
#
# - layout_name - The current layout name.
#
# - session_name - The name of the kitty session file from which this tab was
#   created, if any.
#
# - active_session_name - The name of the kitty session file from which the
#   active window in this tab was created, if any.
#
# - num_windows - The number of windows in the tab.
#
# - num_window_groups - The number of window groups (a window group is a window
#   and all of its overlay windows) in the tab.
#
# - tab.active_wd - The working directory of the currently active window in the
#   tab (expensive, requires syscall). Use tab.active_oldest_wd to get the
#   directory of the oldest foreground process rather than the newest.
#
# - tab.active_exe - The name of the executable running in the foreground of
#   the currently active window in the tab (expensive, requires syscall). Use
#   tab.active_oldest_exe for the oldest foreground process.
#
# - max_title_length - The maximum title length available.
#
# - keyboard_mode - The name of the current keyboard mode or the empty string
#   if no keyboard mode is active.
#
# - tab.last_focused_progress_percent - If a command running in a window
#   reports the progress for a task, show this progress as a percentage from the
#   most recently focused window in the tab. Empty string if no progress is
#   reported.
#
# - tab.progress_percent - If a command running in a window reports the
#   progress for a task, show this progress as a percentage from all windows in
#   the tab, averaged. Empty string is no progress is reported.
#
# - custom - This will call a function named draw_title(data) from the file
#   tab_bar.py placed in the kitty config directory. The function will be passed
#   a dictionary of data, the same data that can be used in this template. It can
#   then perform arbitrarily complex processing and return a string. For example:
#   tab_title_template "{custom}" will use the output of the function as the tab
#   title. Any print statements in the draw_title() will print to the STDOUT of
#   the kitty process, useful for debugging.
#
# Note that formatting is done by Python’s string formatting machinery, so you
# can use, for instance, {layout_name[:2].upper()} to show only the first two
# letters of the layout name, upper-cased. If you want to style the text, you
# can use styling directives, for example:
# {fmt.fg.red}red{fmt.fg.tab}normal{fmt.bg._00FF00}greenbg{fmt.bg.tab}.
# Similarly, for bold and italic:
# {fmt.bold}bold{fmt.nobold}normal{fmt.italic}italic{fmt.noitalic}. The 256
# eight terminal colors can be used as fmt.fg.color0 through fmt.fg.color255.
# Note that for backward compatibility, if {bell_symbol} or {activity_symbol}
# are not present in the template, they are prepended to it.

# tab_title_template "{fmt.fg.red}{bell_symbol}{activity_symbol}{fmt.fg.tab}{tab.last_focused_progress_percent}{title}"



# Template to use for active tabs. If not specified falls back to tab_title_template.

# active_tab_title_template none


# Tab bar colors and styles.

active_tab_foreground #EBDBB2 # GruvBox FG
active_tab_background #665C54
# active_tab_font_style bold-italic
inactive_tab_foreground #BDAE93
inactive_tab_background #3C3836
# inactive_tab_font_style normal


# Background color for the tab bar. Defaults to using the terminal background
# color.

# tab_bar_background none


# Color for the tab bar margin area. Defaults to using the terminal background
# color for margins above and below the tab bar. For side margins the default
# color is chosen to match the background color of the neighboring tab, unless
# the window is translucent, in which case the default background is used as it
# looks better.

# tab_bar_margin_color none


# Control when dragging of tabs to re-order them happens. The value is the drag
# threshold in pixels, the distance the mouse must move before a drag begins. A
# value of zero disables tab dragging entirely. Dragging a tab to another kitty
# window moves it there, while dragging outside any kitty window detaches it
# into a new OS window.
#
# Note that on Wayland, because of poor design cancelling a drag will detach
# the tab. This is worked around for compositors that support xdg-toplevel-drag.

# tab_bar_drag_threshold 5

#########################################################
